<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Meeting Co-pilot</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --navy: #1B2E4B; --blue: #2563EB; --blue-light: #DBEAFE;
        --slate: #334155; --gray-50: #F8FAFC; --gray-100: #F1F5F9;
        --gray-200: #E2E8F0; --gray-500: #64748B; --gray-700: #374151;
        --teal: #0D9488; --teal-light: #CCFBF1;
        --amber: #D97706; --amber-light: #FEF3C7;
        --coral: #DC2626; --coral-light: #FEE2E2;
        --green: #16A34A; --green-light: #DCFCE7;
        --purple: #7C3AED; --purple-light: #EDE9FE;
        --radius: 8px; --radius-lg: 12px;
      }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
             background: var(--gray-100); color: var(--gray-700); font-size: 15px; }
      button { cursor: pointer; font-family: inherit; }
      a { color: var(--blue); text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
